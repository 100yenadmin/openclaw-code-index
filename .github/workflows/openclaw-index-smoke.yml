name: OpenClaw index smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '41 6 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        source: [latest-release, main]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - name: Install GitNexus
        run: npm install -g gitnexus@latest
      - name: Validate OpenClaw Code Index
        run: |
          cd openclaw-code-index
          npm test
          npm run validate
      - name: Index OpenClaw ${{ matrix.source }}
        env:
          GITNEXUS_SKIP_OPTIONAL_GRAMMARS: '1'
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd openclaw-code-index
          node bin/openclaw-code-index.mjs index --source "${{ matrix.source }}" --skip-skills
          gitnexus list
