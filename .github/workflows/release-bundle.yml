name: Release OpenClaw Code Index bundle

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. openclaw-code-index-v0.1.0'
        required: true
  push:
    tags:
      - 'openclaw-code-index-v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate and build bundle
        run: |
          cd openclaw-code-index
          npm test
          npm run validate
          npm run bundle
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG="${INPUT_TAG}"
            git tag -f "$TAG"
            git push -f origin "$TAG"
          fi
          gh release create "$TAG" \
            openclaw-code-index/dist/openclaw-code-index-codex-plugin.zip \
            openclaw-code-index/dist/SHA256SUMS \
            --title "$TAG" \
            --notes-file openclaw-code-index/RELEASE_NOTES.md
